<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแรก - MealMatchy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        
        <!-- หัวเรื่อง -->
        <h1 class="text-3xl font-bold text-orange-600 text-center mb-6">
            Welcome to MealMatchy
        </h1>

        <!-- ปุ่ม Logout -->
        <div class="flex justify-end mb-4">
            <a href="{% url 'logout' %}" 
               class="text-sm text-red-500 font-semibold hover:underline">
                Logout
            </a>
        </div>

        <!-- กล่องเมนูประหยัด -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold text-gray-700 mb-3">
                🍚 เมนูอาหารประหยัดไม่เกิน 50 บาท
            </h2>
            <ul class="list-disc list-inside text-gray-700 space-y-1">
                <li>ข้าวไข่เจียว - 30 บาท</li>
                <li>ผัดมาม่ากะเพรา - 35 บาท</li>
                <li>ข้าวผัดหมู - 45 บาท</li>
                <li>ข้าวผัดพริกแกงหมู - 45 บาท</li>
                <li>ข้าวต้มหมู - 50 บาท</li>
            </ul>
        </div>

    </div>
</body>
</html>
