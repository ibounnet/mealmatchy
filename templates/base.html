<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}MealMatchy{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { DEFAULT:'#f97316', dark:'#ea580c', light:'#fed7aa' }}}}};
  </script>
</head>
<body class="bg-gray-50 text-gray-900">
  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="font-bold text-primary">MealMatchy</a>
        <div class="flex items-center gap-5 text-sm">
          <a href="/accounts/home/" class="hover:text-primary">หน้าแรก</a>
          <a href="/accounts/profile/" class="hover:text-primary">โปรไฟล์</a>
          <a href="/accounts/logout/" class="px-3 py-1.5 rounded-lg bg-primary text-white hover:bg-primary-dark">ออกจากระบบ</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% if messages %}
      <div class="space-y-2 mb-4">
        {% for message in messages %}
          <div class="px-4 py-3 rounded-xl
            {% if message.tags == 'success' %} bg-green-50 text-green-700
            {% elif message.tags == 'error' %} bg-red-50 text-red-700
            {% else %} bg-gray-100 text-gray-700 {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
